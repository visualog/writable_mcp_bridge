<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Xbridge</title>
    <style>
      body {
        margin: 0;
        font-family: "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
        background: #2c2c2c;
        color: #f5f5f5;
      }

      .wrap {
        padding: 12px;
      }

      .brand-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: -2px 0 12px;
        padding: 2px 0 12px;
      }

      .brand-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .brand-mark {
        width: 24px;
        height: 24px;
        flex: 0 0 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .brand-title {
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        color: #f4f4f4;
      }

      .brand-version {
        margin-left: 4px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        line-height: 1.4;
        color: #9eddb0;
        background: rgba(47, 182, 93, 0.14);
        box-shadow: inset 0 0 0 1px rgba(47, 182, 93, 0.18);
      }

      .bridge-toggle {
        position: relative;
        width: 44px;
        height: 26px;
        border-radius: 999px;
        padding: 0;
        background: #4a4a4a;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .bridge-toggle:hover {
        background: #535353;
        transform: none;
      }

      .bridge-toggle[aria-pressed="true"] {
        background: #2fb65d;
      }

      .bridge-toggle[aria-pressed="true"]:hover {
        background: #35c565;
      }

      .bridge-toggle-knob {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ffffff;
        transition: transform 120ms ease;
      }

      .bridge-toggle[aria-pressed="true"] .bridge-toggle-knob {
        transform: translateX(18px);
      }

      p {
        font-size: 12px;
        line-height: 1.5;
        margin: 0 0 8px;
        color: #b3b3b3;
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }

      .subtle {
        color: #8a8a8a;
      }

      .status {
        margin-top: 12px;
        padding: 14px;
        border-radius: 14px;
        background: #383838;
        transition: background 120ms ease, box-shadow 120ms ease;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .status-summary {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.4;
      }

      .status-meta {
        margin-top: 10px;
        font-size: 11px;
        line-height: 1.65;
        color: #a1a1a1;
      }

      .status-next {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #4a4a4a;
        font-size: 12px;
        line-height: 1.5;
        color: #d4d4d4;
      }

      .kv {
        display: grid;
        grid-template-columns: 74px 1fr;
        gap: 6px 8px;
        margin-top: 10px;
      }

      .kv-label {
        font-size: 11px;
        color: #8f8f8f;
      }

      .kv-value {
        font-size: 12px;
        color: #ededed;
        word-break: break-word;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 12px;
      }

      .primary-action {
        margin-top: 10px;
        padding: 12px;
        border-radius: 12px;
        background: #323232;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .primary-action-head {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #a8a8a8;
      }

      .primary-action-desc {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.5;
        color: #d4d4d4;
      }

      .primary-action-button {
        margin-top: 10px;
        width: 100%;
        background: #2fb65d;
        color: #ffffff;
      }

      .primary-action-button:hover {
        background: #35c565;
      }

      .quick-commands {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }

      .quick-command {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .quick-command code {
        font-size: 11px;
        color: #cfcfcf;
        word-break: break-all;
      }

      .quick-copy {
        padding: 6px 10px;
        border-radius: 999px;
        background: #454545;
        font-size: 11px;
      }

      .guided-steps {
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .guided-steps-title {
        font-size: 11px;
        font-weight: 700;
        color: #a9a9a9;
        margin-bottom: 6px;
      }

      .guided-step {
        display: grid;
        grid-template-columns: 18px 1fr;
        gap: 6px;
        align-items: start;
        font-size: 11px;
        line-height: 1.45;
        color: #d7d7d7;
      }

      .guided-step-index {
        color: #8fe3a3;
        font-weight: 700;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #444444;
        color: #f5f5f5;
        transition: background 120ms ease, transform 120ms ease, opacity 120ms ease;
      }

      button:focus,
      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 1px #6a6a6a;
      }

      button:hover {
        background: #545454;
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .status.ok {
        background: rgba(45, 183, 80, 0.12);
        box-shadow: inset 0 0 0 1px rgba(45, 183, 80, 0.18);
      }

      .status.warn {
        background: rgba(214, 163, 50, 0.12);
        box-shadow: inset 0 0 0 1px rgba(214, 163, 50, 0.18);
      }

      .ok {
        color: #8fe3a3;
      }

      .warn {
        color: #f1c75b;
      }

      .ok .status-badge {
        background: rgba(45, 183, 80, 0.18);
        color: #8fe3a3;
      }

      .warn .status-badge {
        background: rgba(214, 163, 50, 0.18);
        color: #f1c75b;
      }

      .action-help {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.55;
        color: #9a9a9a;
      }

      .sessions-panel {
        margin-top: 12px;
        padding: 14px;
        border-radius: 14px;
        background: #343434;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .sessions-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .sessions-title {
        font-size: 12px;
        font-weight: 700;
        color: #d9d9d9;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .sessions-refresh {
        padding: 6px 10px;
        border-radius: 999px;
        background: #444444;
        font-size: 11px;
      }

      .sessions-list {
        display: grid;
        gap: 8px;
      }

      .session-item {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .session-item.current {
        background: rgba(45, 183, 80, 0.12);
        box-shadow: inset 0 0 0 1px rgba(45, 183, 80, 0.22);
      }

      .session-item-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .session-item-title {
        font-size: 13px;
        font-weight: 700;
        color: #efefef;
      }

      .session-item-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 20px;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #cfcfcf;
        font-size: 10px;
        font-weight: 700;
      }

      .session-item.current .session-item-badge {
        background: rgba(45, 183, 80, 0.18);
        color: #8fe3a3;
      }

      .session-item-meta {
        margin-top: 8px;
        display: grid;
        gap: 4px;
        color: #a9a9a9;
        font-size: 11px;
        line-height: 1.45;
      }

      *:focus {
        outline: none;
      }

    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand-bar" aria-label="Xbridge 브랜드">
        <div class="brand-main">
          <div class="brand-mark" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" rx="6" fill="#171717"/>
              <g fill="#FCFCFC">
                <path d="M8.2 4.8C10.1 4.8 11.8 6.1 12.2 8L12.4 8.8L9.5 8C8 7.6 6.9 6.3 6.9 4.8H8.2Z"/>
                <path d="M15.8 4.8C13.9 4.8 12.2 6.1 11.8 8L11.6 8.8L14.5 8C16 7.6 17.1 6.3 17.1 4.8H15.8Z"/>
                <path d="M8.2 19.2C10.1 19.2 11.8 17.9 12.2 16L12.4 15.2L9.5 16C8 16.4 6.9 17.7 6.9 19.2H8.2Z"/>
                <path d="M15.8 19.2C13.9 19.2 12.2 17.9 11.8 16L11.6 15.2L14.5 16C16 16.4 17.1 17.7 17.1 19.2H15.8Z"/>
                <path d="M4.8 8.2C4.8 10.1 6.1 11.8 8 12.2L8.8 12.4L8 9.5C7.6 8 6.3 6.9 4.8 6.9V8.2Z"/>
                <path d="M19.2 8.2C19.2 10.1 17.9 11.8 16 12.2L15.2 12.4L16 9.5C16.4 8 17.7 6.9 19.2 6.9V8.2Z"/>
                <path d="M4.8 15.8C4.8 13.9 6.1 12.2 8 11.8L8.8 11.6L8 14.5C7.6 16 6.3 17.1 4.8 17.1V15.8Z"/>
                <path d="M19.2 15.8C19.2 13.9 17.9 12.2 16 11.8L15.2 11.6L16 14.5C16.4 16 17.7 17.1 19.2 17.1V15.8Z"/>
              </g>
            </svg>
          </div>
          <div class="brand-title">Xbridge</div>
          <div id="bridge-version" class="brand-version"></div>
        </div>
        <button
          id="bridge-toggle"
          class="bridge-toggle"
          type="button"
          aria-label="브리지 사용 토글"
          aria-pressed="true"
          title="브리지 켜기/끄기"
        >
          <span class="bridge-toggle-knob" aria-hidden="true"></span>
        </button>
      </div>
      <div id="server-status" class="status">
        <div class="status-badge">준비 중</div>
        <div class="status-summary">브리지를 시작하는 중...</div>
      </div>
      <div id="session-status" class="status">
        <div class="status-badge">준비 중</div>
        <div class="status-summary">플러그인 세션을 기다리는 중...</div>
      </div>
      <div class="actions">
        <button id="reconnect-bridge" type="button">브리지 재연결</button>
        <button id="reregister-session" type="button">세션 재등록</button>
      </div>
      <section class="primary-action" aria-label="권장 작업">
        <div class="primary-action-head">권장 작업</div>
        <div id="primary-action-desc" class="primary-action-desc">상태를 확인하는 중입니다.</div>
        <button id="primary-action-btn" class="primary-action-button" type="button">확인 중...</button>
        <div id="quick-commands" class="quick-commands" hidden>
          <div class="quick-command">
            <code>cd /Users/im_018/Documents/GitHub/2026_important/figma_skills/xbridge &amp;&amp; npm run start:keychain</code>
            <button class="quick-copy" type="button" data-copy="cd /Users/im_018/Documents/GitHub/2026_important/figma_skills/xbridge && npm run start:keychain">복사</button>
          </div>
          <div class="quick-command">
            <code>lsof -ti tcp:3846</code>
            <button class="quick-copy" type="button" data-copy="lsof -ti tcp:3846">복사</button>
          </div>
          <div class="quick-command">
            <code>kill &lt;PID&gt;</code>
            <button class="quick-copy" type="button" data-copy="kill <PID>">복사</button>
          </div>
        </div>
        <div id="guided-steps" class="guided-steps"></div>
      </section>
      <div id="action-help" class="action-help"></div>
      <section class="sessions-panel" aria-label="활성 세션">
        <div class="sessions-head">
          <div class="sessions-title">활성 세션</div>
          <button id="refresh-sessions" class="sessions-refresh" type="button">목록 새로고침</button>
        </div>
        <div id="sessions-list" class="sessions-list">
          <div class="session-item">
            <div class="session-item-title">세션 목록을 불러오는 중...</div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const BRIDGE_VERSION = "0.2.0";
      const BRIDGE_ORIGINS = ["http://localhost:3846"];
      const serverStatusEl = document.getElementById("server-status");
      const sessionStatusEl = document.getElementById("session-status");
      const reconnectBridgeButton = document.getElementById("reconnect-bridge");
      const reregisterSessionButton = document.getElementById("reregister-session");
      const bridgeToggleButton = document.getElementById("bridge-toggle");
      const bridgeVersionEl = document.getElementById("bridge-version");
      const refreshSessionsButton = document.getElementById("refresh-sessions");
      const sessionsListEl = document.getElementById("sessions-list");
      const actionHelpEl = document.getElementById("action-help");
      const primaryActionDescEl = document.getElementById("primary-action-desc");
      const primaryActionButton = document.getElementById("primary-action-btn");
      const quickCommandsEl = document.getElementById("quick-commands");
      const guidedStepsEl = document.getElementById("guided-steps");
      let bridgeOrigin = null;
      let pollTimer = null;
      let bootstrapRetryTimer = null;
      let pluginId = null;
      let pluginLabel = "플러그인 세션 대기 중";
      let pendingSelection = [];
      let lastPollAt = null;
      let inFlightPoll = false;
      let readyTimer = null;
      let bridgeConnected = false;
      let sessionRegistered = false;
      let needsReconnect = false;
      let needsReregister = false;
      let autoRecoverTimer = null;
      let autoRecoverTickTimer = null;
      let autoRecoverDueAt = null;
      let autoRecoverAttempts = 0;
      let currentFileName = "연결된 파일 없음";
      let currentPageLabel = "연결된 페이지 없음";
      let currentPageId = null;
      let healthLatencyMs = null;
      let lastPollLatencyMs = null;
      let lastSessionSyncAt = null;
      let lastPageSyncAt = null;
      let bridgeEnabled = true;
      let sessionsSnapshot = [];
      let serverErrorCode = null;
      let primaryActionHandler = null;
      const AUTO_RECOVER_DELAY_MS = 3000;

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatLatency(ms) {
        if (typeof ms !== "number" || Number.isNaN(ms)) {
          return "측정 전";
        }
        return `${ms}ms`;
      }

      function formatTimeLabel(value) {
        return value || "기록 없음";
      }

      function buildKv(entries) {
        return `
          <div class="kv">
            ${entries
              .map(
                (entry) => `
                  <div class="kv-label">${escapeHtml(entry.label)}</div>
                  <div class="kv-value">${escapeHtml(entry.value)}</div>
                `
              )
              .join("")}
          </div>
        `;
      }

      function buildServerMeta() {
        return buildKv([
          { label: "응답 시간", value: formatLatency(healthLatencyMs) }
        ]);
      }

      function buildSessionMeta() {
        return buildKv([
          { label: "파일", value: currentFileName },
          { label: "페이지", value: currentPageLabel },
          { label: "마지막 세션 갱신", value: formatTimeLabel(lastSessionSyncAt) },
          { label: "마지막 페이지 동기화", value: formatTimeLabel(lastPageSyncAt) }
        ]);
      }

      function classifyServerErrorCode(message) {
        const value = String(message || "");
        if (!value) {
          return null;
        }
        const lower = value.toLowerCase();
        if (lower.includes("no writable mcp bridge health endpoint found")) {
          return "ERR_SERVER_OFF";
        }
        if (lower.includes("eaddrinuse")) {
          return "ERR_PORT_IN_USE";
        }
        if (lower.includes("failed to fetch")) {
          return "ERR_NETWORK";
        }
        if (lower.includes("timeout") || lower.includes("timed out")) {
          return "ERR_TIMEOUT";
        }
        if (lower.includes("http 4") || lower.includes("http 5")) {
          return "ERR_SERVER_UNREACHABLE";
        }
        return "ERR_UNKNOWN";
      }

      function renderStatus(target, summary, klass, meta, nextAction, badgeOverride) {
        const safeSummary = escapeHtml(summary || "").replace(/\n/g, "<br />");
        const safeMeta = meta
          ? String(meta).trim().startsWith("<")
            ? String(meta)
            : escapeHtml(meta).replace(/\n/g, "<br />")
          : "";
        const safeNextAction = nextAction ? escapeHtml(nextAction).replace(/\n/g, "<br />") : "";
        const badgeText = badgeOverride || (klass === "warn" ? "확인 필요" : "정상");
        target.className = `status${klass ? ` ${klass}` : ""}`;
        target.innerHTML = `
          <div class="${klass || ""}">
            <div class="status-badge">${badgeText}</div>
            <div class="status-summary">${safeSummary}</div>
            ${safeMeta ? `<div class="status-meta">${safeMeta}</div>` : ""}
            ${safeNextAction ? `<div class="status-next">${safeNextAction}</div>` : ""}
          </div>
        `;
      }

      function setServerStatus(summary, klass, meta, nextAction, badgeOverride) {
        if (klass === "warn") {
          serverErrorCode = classifyServerErrorCode(meta);
        } else {
          serverErrorCode = null;
        }
        renderStatus(serverStatusEl, summary, klass, meta, nextAction, badgeOverride);
        renderPrimaryAction();
      }

      function setSessionStatus(summary, klass, meta, nextAction, badgeOverride) {
        renderStatus(sessionStatusEl, summary, klass, meta, nextAction, badgeOverride);
        renderPrimaryAction();
      }

      function setBridgeOrigin(origin) {
        bridgeOrigin = origin;
        updateActionButtons();
      }

      function renderBridgeToggle() {
        bridgeToggleButton.setAttribute("aria-pressed", bridgeEnabled ? "true" : "false");
        bridgeToggleButton.setAttribute(
          "aria-label",
          bridgeEnabled ? "브리지 끄기" : "브리지 켜기"
        );
        bridgeToggleButton.title = bridgeEnabled ? "브리지 끄기" : "브리지 켜기";
      }

      function updateActionButtons() {
        if (!bridgeEnabled) {
          reconnectBridgeButton.disabled = true;
          reregisterSessionButton.disabled = true;
          refreshSessionsButton.disabled = true;
          reconnectBridgeButton.textContent = "브리지 재연결";
          actionHelpEl.textContent =
            "브리지가 일시 중지되었습니다. 상단 토글을 켜면 서버 연결과 세션 등록을 다시 시작합니다.";
          renderPrimaryAction();
          return;
        }
        reconnectBridgeButton.textContent = needsReconnect ? "서버 다시 확인" : "브리지 재연결";
        reconnectBridgeButton.disabled = !needsReconnect;
        reregisterSessionButton.disabled = !bridgeConnected;
        refreshSessionsButton.disabled = !bridgeConnected;
        if (needsReconnect) {
          actionHelpEl.textContent =
            `${serverErrorCode ? `[${serverErrorCode}] ` : ""}서버 연결이 끊긴 상태입니다. '서버 다시 확인'은 연결 상태만 재확인하며, 서버 실행 자체는 하지 않습니다.`;
          renderPrimaryAction();
          return;
        }
        if (needsReregister) {
          actionHelpEl.textContent =
            "브리지는 살아 있지만 세션 등록이 끊겼을 수 있습니다. '세션 재등록'을 눌러 현재 파일 세션을 다시 연결하세요.";
          renderPrimaryAction();
          return;
        }
        if (bridgeConnected) {
          actionHelpEl.textContent =
            "필요하면 언제든 '세션 재등록'을 눌러 현재 파일 메타데이터를 서버에 다시 등록할 수 있습니다.";
          renderPrimaryAction();
          return;
        }
        actionHelpEl.textContent = "";
        renderPrimaryAction();
      }

      function setPrimaryAction(label, description, onClick, showCommands = false) {
        primaryActionButton.textContent = label;
        primaryActionButton.disabled = typeof onClick !== "function";
        primaryActionDescEl.textContent = description;
        primaryActionHandler = onClick;
        quickCommandsEl.hidden = !showCommands;
      }

      function setGuidedSteps(title, steps) {
        const safeTitle = escapeHtml(title || "다음 단계");
        const items = Array.isArray(steps) ? steps : [];
        guidedStepsEl.innerHTML = `
          <div class="guided-steps-title">${safeTitle}</div>
          ${items
            .map(
              (step, index) => `
                <div class="guided-step">
                  <div class="guided-step-index">${index + 1}.</div>
                  <div>${escapeHtml(step)}</div>
                </div>
              `
            )
            .join("")}
        `;
      }

      function renderPrimaryAction() {
        if (!bridgeEnabled) {
          setPrimaryAction(
            "브리지 켜기",
            "브리지가 꺼져 있습니다. 다시 켜면 서버 확인과 세션 동기화를 자동으로 시작합니다.",
            () => setBridgeEnabled(true),
            false
          );
          setGuidedSteps("재개 방법", [
            "상단 토글을 켭니다.",
            "서버 상태 카드가 '확인 중'에서 '정상'으로 바뀌는지 확인합니다.",
            "필요하면 '세션 재등록'을 눌러 현재 파일을 다시 연결합니다."
          ]);
          return;
        }

        if (needsReconnect) {
          const remainingMs =
            typeof autoRecoverDueAt === "number" ? Math.max(0, autoRecoverDueAt - Date.now()) : 0;
          const countdownLabel =
            autoRecoverTimer && remainingMs > 0
              ? ` 자동 재시도까지 ${Math.max(1, Math.ceil(remainingMs / 1000))}초`
              : "";
          setPrimaryAction(
            "서버 다시 확인",
            `${serverErrorCode ? `${serverErrorCode} · ` : ""}서버 프로세스를 먼저 실행한 뒤 연결을 다시 확인하세요.${countdownLabel}`,
            () => reconnectBridge(),
            true
          );
          const reconnectSteps = ["터미널에서 xbridge 서버를 실행합니다.", "'서버 다시 확인'을 눌러 연결 상태를 재확인합니다."];
          if (serverErrorCode === "ERR_PORT_IN_USE") {
            reconnectSteps.unshift("포트 점유 프로세스(PID)를 확인하고 종료합니다.");
          }
          reconnectSteps.push("서버 연결 후 '세션 재등록'으로 현재 파일 세션을 동기화합니다.");
          setGuidedSteps("서버 복구 절차", reconnectSteps);
          return;
        }

        if (needsReregister || (bridgeConnected && !sessionRegistered)) {
          setPrimaryAction(
            "세션 재등록",
            "서버는 연결되어 있습니다. 현재 파일 세션만 다시 등록하면 명령을 계속 실행할 수 있습니다.",
            () => reregisterSession(),
            false
          );
          setGuidedSteps("세션 복구 절차", [
            "현재 작업 중인 Figma 파일 탭에서 플러그인이 열려 있는지 확인합니다.",
            "'세션 재등록'을 눌러 파일/페이지 메타데이터를 다시 등록합니다.",
            "활성 세션 목록에서 현재 세션 배지가 표시되는지 확인합니다."
          ]);
          return;
        }

        if (bridgeConnected) {
          setPrimaryAction(
            "세션 목록 새로고침",
            "현재 연결 상태는 정상입니다. 필요하면 활성 세션 목록을 최신 상태로 새로고침하세요.",
            () => refreshSessionsList(),
            false
          );
          setGuidedSteps("운영 체크", [
            "활성 세션 목록에서 현재 세션이 최상단인지 확인합니다.",
            "필요 시 '세션 재등록'으로 메타데이터를 갱신합니다.",
            "명령 처리 지연이 있으면 목록 새로고침으로 상태를 재확인합니다."
          ]);
          return;
        }

        setPrimaryAction(
          "브리지 재연결",
          "서버 상태를 다시 확인합니다.",
          () => reconnectBridge(),
          false
        );
        setGuidedSteps("기본 절차", [
          "'브리지 재연결'을 눌러 서버 응답을 확인합니다.",
          "서버가 연결되면 세션 상태가 자동으로 갱신되는지 봅니다.",
          "세션 미등록이면 '세션 재등록'으로 복구합니다."
        ]);
      }

      function formatSessionStamp(timestamp) {
        if (typeof timestamp !== "number" || !Number.isFinite(timestamp)) {
          return "기록 없음";
        }
        try {
          return new Date(timestamp).toLocaleTimeString();
        } catch (error) {
          return "기록 없음";
        }
      }

      function renderSessionsList() {
        if (!sessionsListEl) {
          return;
        }

        if (!bridgeEnabled) {
          sessionsListEl.innerHTML = `
            <div class="session-item">
              <div class="session-item-title">브리지가 일시 중지되었습니다</div>
              <div class="session-item-meta">
                <div>상단 토글을 다시 켜면 세션 목록을 불러옵니다.</div>
              </div>
            </div>
          `;
          return;
        }

        if (!bridgeConnected) {
          sessionsListEl.innerHTML = `
            <div class="session-item">
              <div class="session-item-title">서버 연결 후 세션을 확인할 수 있습니다</div>
            </div>
          `;
          return;
        }

        if (!Array.isArray(sessionsSnapshot) || sessionsSnapshot.length === 0) {
          sessionsListEl.innerHTML = `
            <div class="session-item">
              <div class="session-item-title">아직 확인된 세션이 없습니다</div>
              <div class="session-item-meta">
                <div>플러그인 창이 열린 파일에서 세션 재등록을 한 번 시도해 보세요.</div>
              </div>
            </div>
          `;
          return;
        }

        sessionsListEl.innerHTML = sessionsSnapshot
          .map((session) => {
            const isCurrent = Boolean(pluginId) && session.pluginId === pluginId;
            const title = session.fileName || session.pluginId || "알 수 없는 세션";
            const pageLabel = session.pageName || session.pageId || "페이지 정보 없음";
            const selectionCount =
              typeof session.selectionCount === "number" ? session.selectionCount : 0;

            return `
              <div class="session-item${isCurrent ? " current" : ""}">
                <div class="session-item-head">
                  <div class="session-item-title">${escapeHtml(title)}</div>
                  <div class="session-item-badge">${isCurrent ? "현재 세션" : "활성"}</div>
                </div>
                <div class="session-item-meta">
                  <div>pluginId: ${escapeHtml(session.pluginId || "-")}</div>
                  <div>page: ${escapeHtml(pageLabel)}</div>
                  <div>selection: ${escapeHtml(String(selectionCount))}</div>
                  <div>last seen: ${escapeHtml(formatSessionStamp(session.lastSeenAt))}</div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      async function refreshSessionsList() {
        if (!bridgeEnabled || !bridgeOrigin) {
          renderSessionsList();
          return;
        }

        try {
          const response = await fetch(`${bridgeOrigin}/api/sessions`);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          const incoming = Array.isArray(data.sessions) ? data.sessions : [];
          const currentId = pluginId || "";
          sessionsSnapshot = incoming.sort((a, b) => {
            const aCurrent = a?.pluginId === currentId ? 1 : 0;
            const bCurrent = b?.pluginId === currentId ? 1 : 0;
            if (aCurrent !== bCurrent) {
              return bCurrent - aCurrent;
            }
            const aSeen = typeof a?.lastSeenAt === "number" ? a.lastSeenAt : 0;
            const bSeen = typeof b?.lastSeenAt === "number" ? b.lastSeenAt : 0;
            if (aSeen !== bSeen) {
              return bSeen - aSeen;
            }
            return String(a?.pluginId || "").localeCompare(String(b?.pluginId || ""));
          });
        } catch (error) {
          sessionsSnapshot = [];
          sessionsListEl.innerHTML = `
            <div class="session-item">
              <div class="session-item-title">세션 목록을 불러오지 못했습니다</div>
              <div class="session-item-meta">
                <div>${escapeHtml(error instanceof Error ? error.message : String(error))}</div>
              </div>
            </div>
          `;
          return;
        }

        renderSessionsList();
      }

      function setConnectionFlags(next = {}) {
        if (typeof next.bridgeConnected === "boolean") {
          bridgeConnected = next.bridgeConnected;
        }
        if (typeof next.sessionRegistered === "boolean") {
          sessionRegistered = next.sessionRegistered;
        }
        if (typeof next.needsReconnect === "boolean") {
          needsReconnect = next.needsReconnect;
        }
        if (typeof next.needsReregister === "boolean") {
          needsReregister = next.needsReregister;
        }
        updateActionButtons();
      }

      function clearAutoRecoverTimer() {
        if (autoRecoverTimer) {
          clearTimeout(autoRecoverTimer);
          autoRecoverTimer = null;
        }
        autoRecoverDueAt = null;
        if (autoRecoverTickTimer) {
          clearInterval(autoRecoverTickTimer);
          autoRecoverTickTimer = null;
        }
      }

      function ensureAutoRecoverTick() {
        if (autoRecoverTickTimer) {
          return;
        }
        autoRecoverTickTimer = setInterval(() => {
          if (!autoRecoverTimer || !autoRecoverDueAt) {
            clearAutoRecoverTimer();
            return;
          }
          renderPrimaryAction();
        }, 250);
      }

      function clearBootstrapRetryTimer() {
        if (bootstrapRetryTimer) {
          clearTimeout(bootstrapRetryTimer);
          bootstrapRetryTimer = null;
        }
      }

      function stopReadyHandshake() {
        if (readyTimer) {
          clearInterval(readyTimer);
          readyTimer = null;
        }
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      function pauseBridgeUi() {
        setBridgeOrigin(null);
        setConnectionFlags({
          bridgeConnected: false,
          sessionRegistered: false,
          needsReconnect: false,
          needsReregister: false
        });
        setServerStatus(
          "브리지 꺼짐",
          "warn",
          "사용자가 브리지를 일시 중지했습니다.",
          "상단 토글을 다시 켜면 서버 연결과 세션 등록을 재개합니다.",
          "일시 중지"
        );
        setSessionStatus(
          "세션 일시 중지",
          "warn",
          buildSessionMeta(),
          "브리지가 꺼져 있는 동안에는 selection 동기화와 명령 수신이 멈춥니다.",
          "일시 중지"
        );
        renderSessionsList();
      }

      async function setBridgeEnabled(nextEnabled) {
        bridgeEnabled = Boolean(nextEnabled);
        renderBridgeToggle();

        if (!bridgeEnabled) {
          stopPolling();
          stopReadyHandshake();
          clearAutoRecoverTimer();
          clearBootstrapRetryTimer();
          pauseBridgeUi();
          return;
        }

        setServerStatus("서버 확인 중...", "ok", "", "", "준비 중");
        setSessionStatus("세션 확인 대기", "warn", "브리지를 다시 시작하는 중입니다.", "", "대기 중");
        await bootstrapBridge();
      }

      function scheduleAutoRecover(reason) {
        if (!bridgeEnabled) {
          return;
        }
        if (autoRecoverTimer) {
          return;
        }

        autoRecoverDueAt = Date.now() + AUTO_RECOVER_DELAY_MS;
        ensureAutoRecoverTick();
        renderPrimaryAction();
        autoRecoverTimer = setTimeout(async () => {
          autoRecoverTimer = null;
          autoRecoverDueAt = null;
          if (autoRecoverTickTimer) {
            clearInterval(autoRecoverTickTimer);
            autoRecoverTickTimer = null;
          }
          autoRecoverAttempts += 1;
          try {
            await reconnectBridge({ isAuto: true, reason });
          } catch (error) {
            // reconnectBridge handles UI state
          }
        }, AUTO_RECOVER_DELAY_MS);
      }

      function getPluginId() {
        return pluginId || "default";
      }

      async function postJson(path, payload) {
        if (!bridgeOrigin) {
          throw new Error("Bridge origin is not resolved");
        }

        const response = await fetch(`${bridgeOrigin}${path}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return response.json();
      }

      async function resolveBridgeOrigin() {
        for (const origin of BRIDGE_ORIGINS) {
          try {
            const startedAt = performance.now();
            const response = await fetch(`${origin}/health`);
            if (!response.ok) {
              continue;
            }

            const data = await response.json();
            if (data && data.ok && data.server === "writable-mcp-bridge") {
              healthLatencyMs = Math.round(performance.now() - startedAt);
              setBridgeOrigin(origin);
              return origin;
            }
          } catch (error) {
            // keep probing
          }
        }

        throw new Error("No writable MCP bridge health endpoint found");
      }

      function postReadyMessage() {
        parent.postMessage({ pluginMessage: { type: "ready" } }, "*");
      }

      function startReadyHandshake() {
        if (!bridgeEnabled) {
          return;
        }
        if (readyTimer) {
          return;
        }

        postReadyMessage();
        readyTimer = setInterval(() => {
          if (pluginId) {
            clearInterval(readyTimer);
            readyTimer = null;
            return;
          }
          postReadyMessage();
        }, 1000);
      }

      async function registerBridge() {
        if (!bridgeEnabled) {
          return;
        }
        await resolveBridgeOrigin();
        startReadyHandshake();
        setConnectionFlags({
          bridgeConnected: true,
          sessionRegistered: false,
          needsReconnect: false,
          needsReregister: false
        });
        setServerStatus(
          bridgeOrigin || "연결된 서버를 확인하는 중입니다.",
          "ok",
          buildServerMeta(),
          "",
          "서버 연결 정상"
        );
        setSessionStatus(
          currentFileName,
          "ok",
          buildSessionMeta(),
          "세션이 등록되면 현재 파일을 대상으로 명령을 실행할 수 있습니다.",
          "세션 확인 필요"
        );
        await refreshSessionsList();
      }

      async function registerPluginSession() {
        if (!bridgeEnabled) {
          return;
        }
        if (!bridgeOrigin || !pluginId) {
          return;
        }

        await postJson("/plugin/register", {
          pluginId,
          fileName: currentFileName,
          pageId: currentPageId,
          pageName: currentPageLabel
        });
        await publishSelection(pendingSelection);
        setConnectionFlags({
          bridgeConnected: true,
          sessionRegistered: true,
          needsReconnect: false,
          needsReregister: false
        });
        autoRecoverAttempts = 0;
        clearAutoRecoverTimer();
        setServerStatus(
          bridgeOrigin || "연결된 서버 정보를 확인할 수 없습니다.",
          "ok",
          buildServerMeta(),
          "",
          "서버 연결 정상"
        );
        setSessionStatus(currentFileName, "ok", buildSessionMeta(), "", "세션 연결 정상");
        updateActionButtons();
        await refreshSessionsList();
      }

      async function publishSelection(selection) {
        pendingSelection = selection || [];
        if (!bridgeEnabled) {
          return;
        }
        if (!pluginId) {
          return;
        }

        await postJson("/plugin/selection", {
          pluginId,
          selection: pendingSelection
        });
      }

      async function sendCommandResult(commandId, result, error) {
        if (!bridgeEnabled) {
          return;
        }
        await postJson("/plugin/results", {
          commandId,
          result,
          error
        });
      }

      async function pollCommands() {
        if (!bridgeEnabled) {
          return;
        }
        if (!bridgeOrigin || inFlightPoll) {
          return;
        }

        inFlightPoll = true;
        try {
          const startedAt = performance.now();
          const response = await fetch(
            `${bridgeOrigin}/plugin/commands?pluginId=${encodeURIComponent(getPluginId())}`
          );
          const data = await response.json();
          lastPollAt = new Date().toLocaleTimeString();
          lastPollLatencyMs = Math.round(performance.now() - startedAt);

          for (const command of data.commands || []) {
            parent.postMessage(
              {
                pluginMessage: {
                  type: "execute_command",
                  command
                }
              },
              "*"
            );
          }
        } catch (error) {
          setBridgeOrigin(null);
          setConnectionFlags({
            bridgeConnected: false,
            sessionRegistered: false,
            needsReconnect: true,
            needsReregister: Boolean(pluginId)
          });
          setServerStatus(
            "서버 연결 안 됨",
            "warn",
            `${error instanceof Error ? error.message : error}`,
            "자동 복구가 실패하면 '브리지 재연결'이 활성화됩니다.",
            "서버 확인 필요"
          );
          setSessionStatus(
            "세션 확인 대기",
            "warn",
            "서버에 먼저 연결되어야 세션도 다시 연결할 수 있습니다.",
            "",
            "대기 중"
          );
          if (pluginId) {
            scheduleAutoRecover(error instanceof Error ? error.message : String(error));
          }
          renderSessionsList();
        } finally {
          inFlightPoll = false;
        }
      }

      function startPolling() {
        if (!bridgeEnabled) {
          return;
        }
        if (pollTimer) {
          return;
        }

        pollCommands();
        pollTimer = setInterval(pollCommands, 1000);
      }

      async function bootstrapBridge() {
        if (!bridgeEnabled) {
          return;
        }
        try {
          clearBootstrapRetryTimer();
          await registerBridge();
        } catch (error) {
          if (!bridgeEnabled) {
            return;
          }
          setBridgeOrigin(null);
          setServerStatus(
            "서버 연결 안 됨",
            "warn",
            `${error instanceof Error ? error.message : error}`,
            "플러그인에서 서버를 직접 실행할 수 없습니다. 터미널에서 xbridge 서버를 실행한 뒤 '서버 다시 확인'을 눌러주세요.",
            "서버 확인 필요"
          );
          setSessionStatus(
            "세션 확인 대기",
            "warn",
            "서버에 먼저 연결되어야 현재 파일 세션도 연결할 수 있습니다.",
            "",
            "대기 중"
          );
          renderSessionsList();
          clearBootstrapRetryTimer();
          bootstrapRetryTimer = setTimeout(() => {
            bootstrapRetryTimer = null;
            bootstrapBridge();
          }, 3000);
        }
      }

      async function reconnectBridge(options = {}) {
        if (!bridgeEnabled) {
          pauseBridgeUi();
          return;
        }
        clearAutoRecoverTimer();
        const isAuto = Boolean(options.isAuto);
        const reason = options.reason ? `\n원인: ${options.reason}` : "";
        setServerStatus(
          isAuto ? "서버 재연결 중..." : "서버 재연결 중...",
          "ok",
          isAuto
            ? `자동 복구를 시도합니다.${reason}\n자동 시도 횟수: ${autoRecoverAttempts + 1}`
            : "",
          "",
          "진행 중"
        );
        setSessionStatus("세션 확인 대기", "warn", "서버 연결 복구 후 세션 상태를 다시 확인합니다.", "", "대기 중");
        try {
            await registerBridge();
            if (pluginId) {
              await registerPluginSession();
              startPolling();
            } else {
            startReadyHandshake();
              setConnectionFlags({
                bridgeConnected: true,
                sessionRegistered: false,
                needsReconnect: false,
                needsReregister: false
              });
              setServerStatus(
                bridgeOrigin || "연결된 서버 정보를 확인할 수 없습니다.",
                "ok",
                buildServerMeta(),
                "",
                "서버 연결 정상"
              );
              setSessionStatus(
                currentFileName,
                "ok",
                buildSessionMeta(),
                "잠시 후에도 연결되지 않으면 '세션 재등록'을 눌러 현재 파일 세션을 다시 연결하세요.",
                "세션 확인 필요"
              );
            }
          } catch (error) {
          setBridgeOrigin(null);
          setConnectionFlags({
            bridgeConnected: false,
            sessionRegistered: false,
            needsReconnect: true,
            needsReregister: Boolean(pluginId)
          });
          setServerStatus(
            "서버 연결 안 됨",
            "warn",
            `${error instanceof Error ? error.message : error}${isAuto ? `\n자동 시도 횟수: ${autoRecoverAttempts}` : ""}`,
            isAuto
              ? "자동 복구가 계속 실패하면 서버 프로세스를 먼저 실행한 뒤 '서버 다시 확인'으로 재시도해 주세요."
              : "이 버튼은 서버 실행이 아닌 연결 재확인입니다. 서버 프로세스를 먼저 실행해 주세요.",
            "서버 확인 필요"
          );
          setSessionStatus("세션 확인 대기", "warn", "서버 연결이 복구되기 전에는 세션도 연결할 수 없습니다.", "", "대기 중");
          if (isAuto) {
            scheduleAutoRecover("자동 재연결 실패");
          }
        }
      }

      async function reregisterSession() {
        if (!bridgeEnabled) {
          pauseBridgeUi();
          return;
        }
        setSessionStatus("세션 재등록 중...", "ok", "", "", "진행 중");
        try {
          if (!bridgeOrigin) {
            await resolveBridgeOrigin();
            setConnectionFlags({
              bridgeConnected: true,
              needsReconnect: false
            });
          }

          if (!pluginId) {
            startReadyHandshake();
            setConnectionFlags({
              sessionRegistered: false,
              needsReregister: false
            });
            setSessionStatus(
              "세션 연결 안 됨",
              "ok",
              "플러그인이 아직 자신의 세션 정보를 보내지 않았습니다.",
              "플러그인 창이 현재 Figma 파일에서 열려 있는지 확인해 주세요.",
              "세션 확인 필요"
            );
            return;
          }

          await registerPluginSession();
          startPolling();
        } catch (error) {
          setConnectionFlags({
            needsReregister: true
          });
          setSessionStatus(
            "세션 연결 안 됨",
            "warn",
            `${error instanceof Error ? error.message : error}`,
            "현재 파일 세션 정보가 서버에 등록되지 않았습니다. 플러그인 창을 그대로 열어둔 뒤 다시 시도해 주세요.",
            "세션 확인 필요"
          );
        }
      }

      window.onmessage = async (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }

        if (message.type === "plugin_ready") {
          pluginId = message.pluginId || "default";
          currentFileName = message.fileName || "연결된 파일 없음";
          currentPageId = message.pageId || null;
          const nextPageLabel = message.pageName || pluginId;
          const nowLabel = new Date().toLocaleTimeString();
          if (currentPageLabel !== nextPageLabel) {
            lastPageSyncAt = nowLabel;
          } else if (!lastPageSyncAt) {
            lastPageSyncAt = nowLabel;
          }
          currentPageLabel = nextPageLabel;
          lastSessionSyncAt = nowLabel;
          pluginLabel = `${currentFileName} / ${currentPageLabel}`;
          setConnectionFlags({
            needsReregister: false
          });
          if (readyTimer) {
            clearInterval(readyTimer);
            readyTimer = null;
          }

          try {
            await registerPluginSession();
            startPolling();
          } catch (error) {
            setConnectionFlags({
              sessionRegistered: false,
              needsReregister: true
            });
            setSessionStatus(
              "세션 연결 안 됨",
              "warn",
              `${error instanceof Error ? error.message : error}`,
              "현재 파일 세션을 서버에 다시 등록하지 못했습니다. 잠시 후 다시 시도하거나 '세션 재등록'을 눌러주세요.",
              "세션 확인 필요"
            );
            await refreshSessionsList();
          }
          return;
        }

        if (message.type === "selection_changed") {
          try {
            await publishSelection(message.selection || []);
          } catch (error) {
            setConnectionFlags({
              sessionRegistered: false,
              needsReregister: true
            });
            setSessionStatus(
              "세션 연결 안 됨",
              "warn",
              `${error instanceof Error ? error.message : error}\n세션 등록이 끊겼을 수 있습니다. '세션 재등록'이 필요할 수 있습니다.`,
              "현재 파일 세션 정보를 다시 등록하면 selection 동기화가 복구됩니다.",
              "세션 확인 필요"
            );
            await refreshSessionsList();
          }
        }

        if (message.type === "command_result") {
          try {
            await sendCommandResult(
              message.commandId,
              message.result || null,
              message.error || null
            );
            setServerStatus(
              bridgeOrigin || "연결된 서버 정보를 확인할 수 없습니다.",
              "ok",
              buildServerMeta(),
              "",
              "서버 연결 정상"
            );
            setSessionStatus(
              currentFileName,
              message.error ? "warn" : "ok",
              buildSessionMeta(),
              message.error
                ? "명령 실행 중 일부 확인이 필요합니다. 하지만 세션 연결은 유지되고 있습니다."
                : "",
              message.error ? "세션 확인 필요" : "세션 연결 정상"
            );
          } catch (error) {
            setConnectionFlags({
              sessionRegistered: false,
              needsReregister: true
            });
            setSessionStatus(
              "세션 연결 안 됨",
              "warn",
              `${error instanceof Error ? error.message : error}\n브리지는 살아 있지만 현재 세션 등록이 끊겼을 수 있습니다. '세션 재등록'을 눌러주세요.`,
              "세션 등록이 다시 되면 이어서 명령을 처리할 수 있습니다.",
              "세션 확인 필요"
            );
            await refreshSessionsList();
          }
        }
      };

      reconnectBridgeButton.onclick = () => {
        reconnectBridge();
      };

      reregisterSessionButton.onclick = () => {
        reregisterSession();
      };

      bridgeToggleButton.onclick = async () => {
        await setBridgeEnabled(!bridgeEnabled);
      };

      refreshSessionsButton.onclick = async () => {
        await refreshSessionsList();
      };

      primaryActionButton.onclick = () => {
        if (typeof primaryActionHandler === "function") {
          primaryActionHandler();
        }
      };

      document.querySelectorAll(".quick-copy").forEach((button) => {
        button.addEventListener("click", async () => {
          const value = button.getAttribute("data-copy") || "";
          try {
            await navigator.clipboard.writeText(value);
            const original = button.textContent;
            button.textContent = "복사됨";
            setTimeout(() => {
              button.textContent = original || "복사";
            }, 900);
          } catch (error) {
            const original = button.textContent;
            button.textContent = "실패";
            setTimeout(() => {
              button.textContent = original || "복사";
            }, 900);
          }
        });
      });

      setConnectionFlags({
        bridgeConnected: false,
        sessionRegistered: false,
        needsReconnect: false,
        needsReregister: false
      });

      bridgeVersionEl.textContent = `v${BRIDGE_VERSION}`;
      renderBridgeToggle();
      setServerStatus("서버 확인 중...", "ok", "", "", "준비 중");
      setSessionStatus("세션 확인 대기", "warn", "서버 연결이 먼저 확인되면 세션 상태도 이어서 확인합니다.", "", "대기 중");
      renderSessionsList();
      renderPrimaryAction();

      bootstrapBridge();
    </script>
  </body>
</html>
