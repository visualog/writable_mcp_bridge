<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Writable MCP Bridge</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      .wrap {
        padding: 16px;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }

      p {
        font-size: 12px;
        line-height: 1.5;
        margin: 0 0 8px;
        color: #d1d5db;
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }

      .status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #1f2937;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #374151;
        color: #f9fafb;
      }

      button:hover {
        background: #4b5563;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .ok {
        color: #86efac;
      }

      .warn {
        color: #fcd34d;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Writable MCP Bridge</h1>
      <p>Keep this plugin open while Codex calls the writable MCP tools.</p>
      <p>Server: <code id="server-origin">probing localhost ports...</code></p>
      <div id="status" class="status">
        <div>Booting bridge...</div>
      </div>
      <div class="actions">
        <button id="reconnect-bridge" type="button">브리지 재연결</button>
        <button id="reregister-session" type="button">세션 재등록</button>
      </div>
    </div>

    <script>
      const BRIDGE_ORIGINS = [
        "http://localhost:3846",
        "http://localhost:3847",
        "http://localhost:3848",
        "http://localhost:3849"
      ];
      const statusEl = document.getElementById("status");
      const serverOriginEl = document.getElementById("server-origin");
      const reconnectBridgeButton = document.getElementById("reconnect-bridge");
      const reregisterSessionButton = document.getElementById("reregister-session");
      let bridgeOrigin = null;
      let pollTimer = null;
      let pluginId = null;
      let pluginLabel = "waiting for plugin session...";
      let pendingSelection = [];
      let lastPollAt = null;
      let inFlightPoll = false;
      let readyTimer = null;

      function setStatus(text, klass) {
        statusEl.innerHTML = `<div class="${klass || ""}">${text}</div>`;
      }

      function setBridgeOrigin(origin) {
        bridgeOrigin = origin;
        serverOriginEl.textContent = origin || "not connected";
        updateActionButtons();
      }

      function updateActionButtons() {
        reconnectBridgeButton.disabled = false;
        reregisterSessionButton.disabled = !pluginId;
      }

      function getPluginId() {
        return pluginId || "default";
      }

      async function postJson(path, payload) {
        if (!bridgeOrigin) {
          throw new Error("Bridge origin is not resolved");
        }

        const response = await fetch(`${bridgeOrigin}${path}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return response.json();
      }

      async function resolveBridgeOrigin() {
        for (const origin of BRIDGE_ORIGINS) {
          try {
            const response = await fetch(`${origin}/health`);
            if (!response.ok) {
              continue;
            }

            const data = await response.json();
            if (data && data.ok && data.server === "writable-mcp-bridge") {
              setBridgeOrigin(origin);
              return origin;
            }
          } catch (error) {
            // keep probing
          }
        }

        throw new Error("No writable MCP bridge health endpoint found");
      }

      function postReadyMessage() {
        parent.postMessage({ pluginMessage: { type: "ready" } }, "*");
      }

      function startReadyHandshake() {
        if (readyTimer) {
          return;
        }

        postReadyMessage();
        readyTimer = setInterval(() => {
          if (pluginId) {
            clearInterval(readyTimer);
            readyTimer = null;
            return;
          }
          postReadyMessage();
        }, 1000);
      }

      async function registerBridge() {
        await resolveBridgeOrigin();
        startReadyHandshake();
        setStatus(
          `Bridge connected to ${bridgeOrigin}. Waiting for plugin session...`,
          "ok"
        );
      }

      async function registerPluginSession() {
        if (!bridgeOrigin || !pluginId) {
          return;
        }

        await postJson("/plugin/register", { pluginId });
        await publishSelection(pendingSelection);
        setStatus(
          `Bridge connected to ${bridgeOrigin}. Session: ${pluginLabel}.`,
          "ok"
        );
        updateActionButtons();
      }

      async function publishSelection(selection) {
        pendingSelection = selection || [];
        if (!pluginId) {
          return;
        }

        await postJson("/plugin/selection", {
          pluginId,
          selection: pendingSelection
        });
      }

      async function sendCommandResult(commandId, result, error) {
        await postJson("/plugin/results", {
          commandId,
          result,
          error
        });
      }

      async function pollCommands() {
        if (!bridgeOrigin || inFlightPoll) {
          return;
        }

        inFlightPoll = true;
        try {
          const response = await fetch(
            `${bridgeOrigin}/plugin/commands?pluginId=${encodeURIComponent(getPluginId())}`
          );
          const data = await response.json();
          lastPollAt = new Date().toLocaleTimeString();

          for (const command of data.commands || []) {
            parent.postMessage(
              {
                pluginMessage: {
                  type: "execute_command",
                  command
                }
              },
              "*"
            );
          }
        } catch (error) {
          setBridgeOrigin(null);
          setStatus(
            `Bridge polling failed. ${error instanceof Error ? error.message : error}. 서버가 재시작됐다면 '브리지 재연결' 또는 '세션 재등록'을 눌러주세요.`,
            "warn"
          );
        } finally {
          inFlightPoll = false;
        }
      }

      function startPolling() {
        if (pollTimer) {
          return;
        }

        pollCommands();
        pollTimer = setInterval(pollCommands, 1000);
      }

      async function bootstrapBridge() {
        try {
          await registerBridge();
        } catch (error) {
          setBridgeOrigin(null);
          setStatus(
            `Bridge registration failed. ${error instanceof Error ? error.message : error}`,
            "warn"
          );
          setTimeout(bootstrapBridge, 3000);
        }
      }

      async function reconnectBridge() {
        setStatus("브리지 재연결 중...", "");
        try {
          await registerBridge();
          if (pluginId) {
            await registerPluginSession();
            startPolling();
          } else {
            startReadyHandshake();
            setStatus(
              `Bridge connected to ${bridgeOrigin}. 플러그인 세션 정보를 다시 기다리는 중입니다.`,
              "ok"
            );
          }
        } catch (error) {
          setBridgeOrigin(null);
          setStatus(
            `Bridge reconnect failed. ${error instanceof Error ? error.message : error}`,
            "warn"
          );
        }
      }

      async function reregisterSession() {
        setStatus("세션 재등록 중...", "");
        try {
          if (!bridgeOrigin) {
            await resolveBridgeOrigin();
          }

          if (!pluginId) {
            startReadyHandshake();
            setStatus(
              `Bridge connected to ${bridgeOrigin}. plugin_ready 응답을 기다리는 중입니다.`,
              "ok"
            );
            return;
          }

          await registerPluginSession();
          startPolling();
        } catch (error) {
          setStatus(
            `Session re-register failed. ${error instanceof Error ? error.message : error}`,
            "warn"
          );
        }
      }

      window.onmessage = async (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }

        if (message.type === "plugin_ready") {
          pluginId = message.pluginId || "default";
          pluginLabel = message.fileName
            ? `${message.fileName} (${pluginId})`
            : pluginId;
          if (readyTimer) {
            clearInterval(readyTimer);
            readyTimer = null;
          }

          try {
            await registerPluginSession();
            startPolling();
          } catch (error) {
            setStatus(
              `Plugin registration failed. ${error instanceof Error ? error.message : error}`,
              "warn"
            );
          }
          return;
        }

        if (message.type === "selection_changed") {
          try {
            await publishSelection(message.selection || []);
          } catch (error) {
            setStatus(
              `Selection publish failed. ${error instanceof Error ? error.message : error}`,
              "warn"
            );
          }
        }

        if (message.type === "command_result") {
          try {
            await sendCommandResult(
              message.commandId,
              message.result || null,
              message.error || null
            );
            setStatus(
              `Bridge connected to ${bridgeOrigin}. Session: ${pluginLabel}. Last poll: ${lastPollAt || "pending"}.`,
              message.error ? "warn" : "ok"
            );
          } catch (error) {
            setStatus(
              `Result publish failed. ${error instanceof Error ? error.message : error}`,
              "warn"
            );
          }
        }
      };

      reconnectBridgeButton.onclick = () => {
        reconnectBridge();
      };

      reregisterSessionButton.onclick = () => {
        reregisterSession();
      };

      updateActionButtons();

      bootstrapBridge();
    </script>
  </body>
</html>
