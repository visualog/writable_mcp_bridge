<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Writable MCP Bridge</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      .wrap {
        padding: 16px;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }

      p {
        font-size: 12px;
        line-height: 1.5;
        margin: 0 0 8px;
        color: #d1d5db;
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }

      .status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #1f2937;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .status-summary {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.4;
      }

      .status-meta {
        margin-top: 8px;
        font-size: 11px;
        line-height: 1.5;
        color: #9ca3af;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #374151;
        color: #f9fafb;
      }

      button:hover {
        background: #4b5563;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .ok {
        color: #86efac;
      }

      .warn {
        color: #fcd34d;
      }

      .ok .status-badge {
        background: rgba(34, 197, 94, 0.18);
        color: #86efac;
      }

      .warn .status-badge {
        background: rgba(250, 204, 21, 0.16);
        color: #fcd34d;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Writable MCP Bridge</h1>
      <p>Codex가 writable MCP 도구를 호출하는 동안 이 플러그인을 열어두세요.</p>
      <p>서버 주소: <code id="server-origin">localhost 포트를 확인하는 중...</code></p>
      <div id="status" class="status">
        <div class="status-badge">준비 중</div>
        <div class="status-summary">브리지를 시작하는 중...</div>
        <div class="status-meta">서버와 플러그인 세션을 확인한 뒤 연결합니다.</div>
      </div>
      <div class="actions">
        <button id="reconnect-bridge" type="button">브리지 재연결</button>
        <button id="reregister-session" type="button">세션 재등록</button>
      </div>
    </div>

    <script>
      const BRIDGE_ORIGINS = ["http://localhost:3846"];
      const statusEl = document.getElementById("status");
      const serverOriginEl = document.getElementById("server-origin");
      const reconnectBridgeButton = document.getElementById("reconnect-bridge");
      const reregisterSessionButton = document.getElementById("reregister-session");
      let bridgeOrigin = null;
      let pollTimer = null;
      let pluginId = null;
      let pluginLabel = "플러그인 세션 대기 중";
      let pendingSelection = [];
      let lastPollAt = null;
      let inFlightPoll = false;
      let readyTimer = null;
      let bridgeConnected = false;
      let sessionRegistered = false;
      let needsReconnect = false;
      let needsReregister = false;

      function setStatus(summary, klass, meta) {
        const safeSummary = String(summary || "").replace(/\n/g, "<br />");
        const safeMeta = meta ? String(meta).replace(/\n/g, "<br />") : "";
        const badgeText = klass === "warn" ? "확인 필요" : "연결됨";
        statusEl.innerHTML = `
          <div class="${klass || ""}">
            <div class="status-badge">${badgeText}</div>
            <div class="status-summary">${safeSummary}</div>
            ${safeMeta ? `<div class="status-meta">${safeMeta}</div>` : ""}
          </div>
        `;
      }

      function setBridgeOrigin(origin) {
        bridgeOrigin = origin;
        serverOriginEl.textContent = origin || "연결 안 됨";
        updateActionButtons();
      }

      function updateActionButtons() {
        reconnectBridgeButton.disabled = !needsReconnect;
        reregisterSessionButton.disabled = !needsReregister;
      }

      function setConnectionFlags(next = {}) {
        if (typeof next.bridgeConnected === "boolean") {
          bridgeConnected = next.bridgeConnected;
        }
        if (typeof next.sessionRegistered === "boolean") {
          sessionRegistered = next.sessionRegistered;
        }
        if (typeof next.needsReconnect === "boolean") {
          needsReconnect = next.needsReconnect;
        }
        if (typeof next.needsReregister === "boolean") {
          needsReregister = next.needsReregister;
        }
        updateActionButtons();
      }

      function getPluginId() {
        return pluginId || "default";
      }

      async function postJson(path, payload) {
        if (!bridgeOrigin) {
          throw new Error("Bridge origin is not resolved");
        }

        const response = await fetch(`${bridgeOrigin}${path}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return response.json();
      }

      async function resolveBridgeOrigin() {
        for (const origin of BRIDGE_ORIGINS) {
          try {
            const response = await fetch(`${origin}/health`);
            if (!response.ok) {
              continue;
            }

            const data = await response.json();
            if (data && data.ok && data.server === "writable-mcp-bridge") {
              setBridgeOrigin(origin);
              return origin;
            }
          } catch (error) {
            // keep probing
          }
        }

        throw new Error("No writable MCP bridge health endpoint found");
      }

      function postReadyMessage() {
        parent.postMessage({ pluginMessage: { type: "ready" } }, "*");
      }

      function startReadyHandshake() {
        if (readyTimer) {
          return;
        }

        postReadyMessage();
        readyTimer = setInterval(() => {
          if (pluginId) {
            clearInterval(readyTimer);
            readyTimer = null;
            return;
          }
          postReadyMessage();
        }, 1000);
      }

      async function registerBridge() {
        await resolveBridgeOrigin();
        startReadyHandshake();
        setConnectionFlags({
          bridgeConnected: true,
          sessionRegistered: false,
          needsReconnect: false,
          needsReregister: false
        });
        setStatus(
          "브리지 서버에 연결되었습니다.",
          "ok",
          `서버: ${bridgeOrigin}\n플러그인 세션 정보를 기다리는 중입니다. 세션이 아직 등록되지 않아 명령은 실행되지 않습니다.`
        );
      }

      async function registerPluginSession() {
        if (!bridgeOrigin || !pluginId) {
          return;
        }

        await postJson("/plugin/register", { pluginId });
        await publishSelection(pendingSelection);
        setConnectionFlags({
          bridgeConnected: true,
          sessionRegistered: true,
          needsReconnect: false,
          needsReregister: false
        });
        setStatus(
          "플러그인 세션이 연결되었습니다.",
          "ok",
          `서버: ${bridgeOrigin}\n세션: ${pluginLabel}`
        );
        updateActionButtons();
      }

      async function publishSelection(selection) {
        pendingSelection = selection || [];
        if (!pluginId) {
          return;
        }

        await postJson("/plugin/selection", {
          pluginId,
          selection: pendingSelection
        });
      }

      async function sendCommandResult(commandId, result, error) {
        await postJson("/plugin/results", {
          commandId,
          result,
          error
        });
      }

      async function pollCommands() {
        if (!bridgeOrigin || inFlightPoll) {
          return;
        }

        inFlightPoll = true;
        try {
          const response = await fetch(
            `${bridgeOrigin}/plugin/commands?pluginId=${encodeURIComponent(getPluginId())}`
          );
          const data = await response.json();
          lastPollAt = new Date().toLocaleTimeString();

          for (const command of data.commands || []) {
            parent.postMessage(
              {
                pluginMessage: {
                  type: "execute_command",
                  command
                }
              },
              "*"
            );
          }
        } catch (error) {
          setBridgeOrigin(null);
          setConnectionFlags({
            bridgeConnected: false,
            sessionRegistered: false,
            needsReconnect: true,
            needsReregister: Boolean(pluginId)
          });
          setStatus(
            "브리지 연결이 끊겼습니다.",
            "warn",
            `${error instanceof Error ? error.message : error}\n서버가 내려갔거나 다시 시작된 상태일 수 있습니다. 먼저 '브리지 재연결'이 필요하고, 필요하면 세션도 다시 등록해야 합니다.`
          );
        } finally {
          inFlightPoll = false;
        }
      }

      function startPolling() {
        if (pollTimer) {
          return;
        }

        pollCommands();
        pollTimer = setInterval(pollCommands, 1000);
      }

      async function bootstrapBridge() {
        try {
          await registerBridge();
        } catch (error) {
          setBridgeOrigin(null);
          setStatus(
            "브리지 등록에 실패했습니다.",
            "warn",
            `${error instanceof Error ? error.message : error}`
          );
          setTimeout(bootstrapBridge, 3000);
        }
      }

      async function reconnectBridge() {
        setStatus("브리지를 다시 연결하는 중...", "ok");
        try {
          await registerBridge();
          if (pluginId) {
            await registerPluginSession();
            startPolling();
          } else {
            startReadyHandshake();
            setConnectionFlags({
              bridgeConnected: true,
              sessionRegistered: false,
              needsReconnect: false,
              needsReregister: false
            });
            setStatus(
              "브리지 서버에 다시 연결되었습니다.",
              "ok",
              `서버: ${bridgeOrigin}\n플러그인 세션 정보를 다시 기다리는 중입니다. 플러그인이 아직 세션 정보를 서버에 다시 보내지 않았습니다.`
            );
          }
        } catch (error) {
          setBridgeOrigin(null);
          setConnectionFlags({
            bridgeConnected: false,
            sessionRegistered: false,
            needsReconnect: true,
            needsReregister: Boolean(pluginId)
          });
          setStatus(
            "브리지 재연결에 실패했습니다.",
            "warn",
            `${error instanceof Error ? error.message : error}`
          );
        }
      }

      async function reregisterSession() {
        setStatus("세션을 다시 등록하는 중...", "ok");
        try {
          if (!bridgeOrigin) {
            await resolveBridgeOrigin();
            setConnectionFlags({
              bridgeConnected: true,
              needsReconnect: false
            });
          }

          if (!pluginId) {
            startReadyHandshake();
            setConnectionFlags({
              sessionRegistered: false,
              needsReregister: false
            });
            setStatus(
              "플러그인 세션 응답을 기다리는 중입니다.",
              "ok",
              `서버: ${bridgeOrigin}\n플러그인이 아직 자신의 세션 정보를 보내지 않았습니다. plugin_ready 응답을 기다리는 중입니다.`
            );
            return;
          }

          await registerPluginSession();
          startPolling();
        } catch (error) {
          setConnectionFlags({
            needsReregister: true
          });
          setStatus(
            "세션 재등록에 실패했습니다.",
            "warn",
            `${error instanceof Error ? error.message : error}`
          );
        }
      }

      window.onmessage = async (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }

        if (message.type === "plugin_ready") {
          pluginId = message.pluginId || "default";
          pluginLabel = message.fileName
            ? `${message.fileName} (${pluginId})`
            : pluginId;
          setConnectionFlags({
            needsReregister: false
          });
          if (readyTimer) {
            clearInterval(readyTimer);
            readyTimer = null;
          }

          try {
            await registerPluginSession();
            startPolling();
          } catch (error) {
            setConnectionFlags({
              sessionRegistered: false,
              needsReregister: true
            });
            setStatus(
              "플러그인 세션 등록에 실패했습니다.",
              "warn",
              `${error instanceof Error ? error.message : error}`
            );
          }
          return;
        }

        if (message.type === "selection_changed") {
          try {
            await publishSelection(message.selection || []);
          } catch (error) {
            setConnectionFlags({
              sessionRegistered: false,
              needsReregister: true
            });
            setStatus(
              "선택 상태 전송에 실패했습니다.",
              "warn",
              `${error instanceof Error ? error.message : error}\n세션 등록이 끊겼을 수 있습니다. '세션 재등록'이 필요할 수 있습니다.`
            );
          }
        }

        if (message.type === "command_result") {
          try {
            await sendCommandResult(
              message.commandId,
              message.result || null,
              message.error || null
            );
            setStatus(
              message.error ? "명령 처리 중 확인이 필요합니다." : "브리지와 세션이 정상 연결되어 있습니다.",
              message.error ? "warn" : "ok",
              `서버: ${bridgeOrigin}\n세션: ${pluginLabel}\n마지막 polling: ${lastPollAt || "대기 중"}`
            );
          } catch (error) {
            setConnectionFlags({
              sessionRegistered: false,
              needsReregister: true
            });
            setStatus(
              "명령 결과 전송에 실패했습니다.",
              "warn",
              `${error instanceof Error ? error.message : error}\n브리지는 살아 있지만 현재 세션 등록이 끊겼을 수 있습니다. '세션 재등록'을 눌러주세요.`
            );
          }
        }
      };

      reconnectBridgeButton.onclick = () => {
        reconnectBridge();
      };

      reregisterSessionButton.onclick = () => {
        reregisterSession();
      };

      setConnectionFlags({
        bridgeConnected: false,
        sessionRegistered: false,
        needsReconnect: false,
        needsReregister: false
      });

      bootstrapBridge();
    </script>
  </body>
</html>
