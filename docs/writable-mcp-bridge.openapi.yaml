openapi: 3.1.0
info:
  title: Writable MCP Bridge API
  version: 0.5.63
  summary: Local HTTP bridge for writing to a connected Figma file through the Writable MCP Bridge plugin.
  description: |
    OpenAPI-style draft for the Writable MCP Bridge.

    This document includes:
    - Implemented endpoints that are already supported by the bridge runtime
    - Recommended next-step endpoints for design-system-oriented authoring workflows

    Notes:
    - `pluginId` identifies the connected Figma plugin session, for example `page:33023:62` or `file:<fileKey>`.
    - Text font fields (`fontFamily`, `fontStyle`, `fontSize`) are supported for `create-node` and `update-node`.
    - Recommended endpoints are marked with `x-status: proposed`.
servers:
  - url: http://127.0.0.1:3846
    description: Local writable MCP bridge
tags:
  - name: Core
  - name: Text
  - name: Layout
  - name: Components
  - name: Discovery
  - name: Proposed
paths:
  /health:
    get:
      tags: [Discovery]
      summary: Check bridge health and active plugin sessions
      operationId: getHealth
      responses:
        '200':
          description: Health response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  server:
                    type: string
                  serverVersion:
                    type: string
                  packageName:
                    type: string
                  packageVersion:
                    type: string
                  port:
                    type: integer
                  transportCapabilities:
                    type: object
                    properties:
                      healthEvents:
                        type: boolean
                      sse:
                        type: boolean
                      websocket:
                        type: boolean
                      websocketCommandChannel:
                        type: boolean
                      httpPollingFallback:
                        type: boolean
                  runtimeFeatureFlags:
                    type: object
                    properties:
                      streamingFirst:
                        type: boolean
                      healthBroadcast:
                        type: boolean
                      eventStreamMirror:
                        type: boolean
                      websocketCommandMirror:
                        type: boolean
                      pollingFallback:
                        type: boolean
                  transportHealth:
                    $ref: '#/components/schemas/TransportHealth'
                  commandReadiness:
                    $ref: '#/components/schemas/CommandReadiness'
                  activePlugins:
                    type: array
                    items:
                      type: string
                  activePluginId:
                    type: [string, 'null']
                  activeSession:
                    oneOf:
                      - $ref: '#/components/schemas/SessionSnapshot'
                      - type: 'null'
                  activeSessionResolution:
                    $ref: '#/components/schemas/ActiveSessionResolution'
                  currentReadHealth:
                    type: string
                  recentFailedTotal:
                    type: integer
                  lastFailureAt:
                    type: [integer, 'null']
                  lastFailureCommand:
                    type: [object, 'null']
                    additionalProperties: true
                  observability:
                    type: object
                    additionalProperties: true

  /api/runtime-ops:
    get:
      tags: [Discovery]
      summary: Return session, queue, and transport observability diagnostics
      operationId: getRuntimeOps
      parameters:
        - in: query
          name: staleLimit
          schema:
            type: integer
          description: Maximum number of stale sessions to include in the snapshot
      responses:
        '200':
          description: Runtime observability response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/RuntimeOpsResult'

  /api/get-selection:
    post:
      tags: [Discovery]
      summary: Read current selection from the connected Figma session
      operationId: getSelection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginRequest'
      responses:
        '200':
          description: Selection response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
                    properties:
                      selection:
                        type: array
                        items:
                          $ref: '#/components/schemas/NodeRef'

  /api/get-metadata:
    post:
      tags: [Discovery]
      summary: Return a sparse XML outline for the current selection, explicit target node, or current page
      operationId: getMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  properties:
                    targetNodeId:
                      type: string
                    maxDepth:
                      type: integer
                    maxNodes:
                      type: integer
      responses:
        '200':
          description: Metadata response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/MetadataResult'

  /api/get-variable-defs:
    post:
      tags: [Discovery]
      summary: Return variables and shared styles used in the current selection, explicit target node, or current page
      operationId: getVariableDefs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  properties:
                    targetNodeId:
                      type: string
                    maxDepth:
                      type: integer
                    maxNodes:
                      type: integer
      responses:
        '200':
          description: Variable and style usage response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/VariableDefsResult'

  /api/search-design-system:
    post:
      tags: [Discovery, Components]
      summary: Search the current file for local components, styles, and variables, and optionally merge in external library/file matches
      operationId: searchDesignSystem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  properties:
                    query:
                      type: string
                    maxResults:
                      type: integer
                    kinds:
                      type: array
                      items:
                        type: string
                        enum: [components, styles, variables]
                    sources:
                      type: array
                      items:
                        type: string
                        enum: [local-file, library-files, all]
                    includeComponents:
                      type: boolean
                    includeStyles:
                      type: boolean
                    includeVariables:
                      type: boolean
                    fileKeys:
                      type: array
                      items:
                        type: string
      responses:
        '200':
          description: Design system search response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/DesignSystemSearchResult'

  /api/search-instances:
    post:
      tags: [Discovery, Components]
      summary: Search instance nodes in an explicit target, the current selection, or the current page
      operationId: searchInstances
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - $ref: '#/components/schemas/SearchInstancesRequest'
      responses:
        '200':
          description: Instance search response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/SearchInstancesResult'

  /api/figma/file-comments:
    get:
      tags: [Discovery]
      summary: List file comment threads for the active or explicit Figma file
      description: |
        Reads general Figma comment threads through the REST-backed account path.
        Use `targetNodeId` to narrow the result to threads anchored to a specific node.
      operationId: listFileComments
      parameters:
        - in: query
          name: pluginId
          schema:
            type: string
            default: default
          description: Plugin session used to infer the file key when `fileKey` is omitted.
        - in: query
          name: fileKey
          schema:
            type: string
          description: Explicit file key. When omitted, the active session file key is used.
        - in: query
          name: maxResults
          schema:
            type: integer
          description: Maximum number of threads to return.
        - in: query
          name: includeResolved
          schema:
            type: boolean
            default: true
          description: Include resolved threads when true.
        - in: query
          name: targetNodeId
          schema:
            type: string
          description: Limit results to threads anchored to the given node ID.
      responses:
        '200':
          description: File comments response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/FileCommentsResult'

  /api/create-component:
    post:
      tags: [Components]
      summary: Promote an existing node in the current file into a local component
      operationId: createComponent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  properties:
                    targetNodeId:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                  required: [targetNodeId]
      responses:
        '200':
          description: Create component response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
                    properties:
                      created:
                        type: object
                        properties:
                          component:
                            type: object
                            properties:
                              id: { type: string }
                              key:
                                type: string
                                nullable: true
                              name: { type: string }
                              type: { type: string }
                              parentId:
                                type: string
                                nullable: true
                              x: { type: number }
                              y: { type: number }
                              width: { type: number }
                              height: { type: number }
                              description:
                                type: string
                                nullable: true
                          sourceNodeId:
                            type: string
                          promoted:
                            type: boolean

  /api/create-component-set:
    post:
      tags: [Components]
      summary: Combine existing local components into a component set
      operationId: createComponentSet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  properties:
                    componentNodeIds:
                      type: array
                      items:
                        type: string
                    parentId:
                      type: string
                    index:
                      type: integer
                    name:
                      type: string
                    description:
                      type: string
                  required: [componentNodeIds]
      responses:
        '200':
          description: Create component set response

  /api/search-nodes:
    post:
      tags: [Discovery]
      summary: Search descendants by name and node type
      operationId: searchNodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  properties:
                    targetNodeId:
                      type: string
                    query:
                      type: string
                    nodeTypes:
                      type: array
                      items:
                        type: string
                    maxDepth:
                      type: integer
                    maxResults:
                      type: integer
                    includeText:
                      type: boolean
      responses:
        '200':
          description: Search results

  /api/list-text-nodes:
    post:
      tags: [Discovery, Text]
      summary: List text nodes under the current selection or a target node
      operationId: listTextNodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  properties:
                    targetNodeId:
                      type: string
      responses:
        '200':
          description: Text node list

  /api/create-node:
    post:
      tags: [Core, Text]
      summary: Create a frame, rectangle, or text node inside a target parent
      operationId: createNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodeRequest'
      responses:
        '200':
          description: Created node response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
                    properties:
                      created:
                        $ref: '#/components/schemas/CreatedNode'

  /api/update-node:
    post:
      tags: [Core, Text, Layout]
      summary: Update a single node
      description: Supports geometry, fills, auto layout fields, and text font properties.
      operationId: updateNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeUpdateRequest'
      responses:
        '200':
          description: Updated node response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
                    properties:
                      updated:
                        $ref: '#/components/schemas/UpdatedNode'

  /api/bulk-update-nodes:
    post:
      tags: [Core, Text, Layout]
      summary: Update multiple nodes in one request
      operationId: bulkUpdateNodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [updates]
                  properties:
                    updates:
                      type: array
                      items:
                        $ref: '#/components/schemas/NodeUpdate'
      responses:
        '200':
          description: Bulk update response

  /api/update-text:
    post:
      tags: [Text]
      summary: Update text contents for a single text node
      operationId: updateText
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [nodeId, text]
                  properties:
                    nodeId:
                      type: string
                    text:
                      type: string
      responses:
        '200':
          description: Text updated response

  /api/bulk-update-texts:
    post:
      tags: [Text]
      summary: Update multiple text nodes in one request
      operationId: bulkUpdateTexts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [updates]
                  properties:
                    updates:
                      type: array
                      items:
                        type: object
                        required: [nodeId, text]
                        properties:
                          nodeId:
                            type: string
                          text:
                            type: string
      responses:
        '200':
          description: Bulk text update response

  /api/import-library-component:
    post:
      tags: [Components]
      summary: Import a library component or component set and place an instance
      operationId: importLibraryComponent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [key, parentId]
                  properties:
                    key:
                      type: string
                    parentId:
                      type: string
                    assetType:
                      type: string
                      enum: [COMPONENT, COMPONENT_SET]
                    name:
                      type: string
                    index:
                      type: integer
                    x:
                      type: number
                    y:
                      type: number
      responses:
        '200':
          description: Imported component response

  /api/list-component-properties:
    post:
      tags: [Components]
      summary: List component properties for an instance-like node
      operationId: listComponentProperties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  properties:
                    targetNodeId:
                      type: string
      responses:
        '200':
          description: Component property list

  /api/set-component-property:
    post:
      tags: [Components]
      summary: Set a component property on an instance
      operationId: setComponentProperty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [nodeId, propertyName, value]
                  properties:
                    nodeId:
                      type: string
                    propertyName:
                      type: string
                    value:
                      oneOf:
                        - type: string
                        - type: boolean
      responses:
        '200':
          description: Component property updated response

  /api/set-component-properties:
    post:
      tags: [Components]
      summary: Set multiple component properties on an instance in one atomic update
      operationId: setComponentProperties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - $ref: '#/components/schemas/SetComponentPropertiesRequest'
      responses:
        '200':
          description: Component properties updated response

  /api/add-component-property:
    post:
      tags: [Components]
      summary: Add a component property to a local component or component set
      operationId: addComponentProperty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [targetNodeId, propertyName, propertyType, defaultValue]
                  properties:
                    targetNodeId:
                      type: string
                    propertyName:
                      type: string
                    propertyType:
                      type: string
                      enum: [BOOLEAN, TEXT, VARIANT]
                    defaultValue:
                      oneOf:
                        - type: string
                        - type: boolean
      responses:
        '200':
          description: Component property created response

  /api/edit-component-property:
    post:
      tags: [Components]
      summary: Rename or update the default value of a component property
      operationId: editComponentProperty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [targetNodeId, propertyName]
                  properties:
                    targetNodeId:
                      type: string
                    propertyName:
                      type: string
                    name:
                      type: string
                    defaultValue:
                      oneOf:
                        - type: string
                        - type: boolean
      responses:
        '200':
          description: Component property updated response

  /api/set-variant-properties:
    post:
      tags: [Components]
      summary: Set variant property values on a component inside a local component set
      operationId: setVariantProperties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [componentNodeId, variantProperties]
                  properties:
                    componentNodeId:
                      type: string
                    variantProperties:
                      type: object
                      additionalProperties:
                        type: string
      responses:
        '200':
          description: Variant properties updated response

  /api/move-node:
    post:
      tags: [Core]
      summary: Move a node into a target parent
      operationId: moveNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [nodeId, parentId]
                  properties:
                    nodeId:
                      type: string
                    parentId:
                      type: string
                    index:
                      type: integer
      responses:
        '200':
          description: Move response

  /api/reorder-child:
    post:
      tags: [Core]
      summary: Reorder a node within its current parent
      operationId: reorderChild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [nodeId, index]
                  properties:
                    nodeId:
                      type: string
                    index:
                      type: integer
      responses:
        '200':
          description: Reorder response

  /api/delete-node:
    post:
      tags: [Core]
      summary: Delete a node
      operationId: deleteNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [nodeId]
                  properties:
                    nodeId:
                      type: string
      responses:
        '200':
          description: Delete response

  /api/duplicate-node:
    post:
      tags: [Core]
      summary: Duplicate a node
      operationId: duplicateNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [nodeId]
                  properties:
                    nodeId:
                      type: string
                    count:
                      type: integer
                      default: 1
      responses:
        '200':
          description: Duplicate response

  /api/normalize-spacing:
    post:
      tags: [Layout]
      summary: Normalize gap and padding for an auto layout container
      operationId: normalizeSpacing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - type: object
                  required: [containerId]
                  properties:
                    containerId:
                      type: string
                    spacing:
                      type: number
                      default: 8
                    mode:
                      type: string
                      enum: [both, gap, padding]
                    recursive:
                      type: boolean
      responses:
        '200':
          description: Normalize spacing response

  /api/undo-last-batch:
    post:
      tags: [Core]
      summary: Undo the most recent supported mutation batch
      operationId: undoLastBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginRequest'
      responses:
        '200':
          description: Undo response

  /api/bind-variable:
    post:
      tags: [Components]
      summary: Bind or unbind a variable on a supported node property
      operationId: bindVariable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - $ref: '#/components/schemas/BindVariableRequest'
      responses:
        '200':
          description: Variable binding response

  /api/apply-style:
    post:
      tags: [Components]
      summary: Apply or clear a supported shared style on a node
      operationId: applyStyle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - $ref: '#/components/schemas/ApplyStyleRequest'
      responses:
        '200':
          description: Style application response

  /api/convert-to-auto-layout:
    post:
      tags: [Proposed]
      summary: Convert a frame-like node to an auto layout container
      operationId: convertToAutoLayout
      x-status: proposed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PluginRequest'
                - $ref: '#/components/schemas/AutoLayoutFields'
                - type: object
                  required: [nodeId, layoutMode]
                  properties:
                    nodeId:
                      type: string
      responses:
        '200':
          description: Conversion response

components:
  schemas:
    PluginRequest:
      type: object
      properties:
        pluginId:
          type: string
          default: default

    SessionSnapshot:
      type: object
      properties:
        pluginId:
          type: string
        state:
          type: string
        fileKey:
          type: [string, 'null']
        fileName:
          type: [string, 'null']
        pageId:
          type: [string, 'null']
        pageName:
          type: [string, 'null']
        lastSeenAt:
          type: [integer, 'null']
        staleMs:
          type: [integer, 'null']
        registeredAt:
          type: [integer, 'null']
        uiMetrics:
          type: [object, 'null']
          additionalProperties: true

    ActiveSessionResolution:
      type: object
      properties:
        status:
          type: string
          enum: [default, single, ambiguous, unavailable]
        summary:
          type: string
        reason:
          type: string
        primaryPluginId:
          type: [string, 'null']
        livePluginIds:
          type: array
          items:
            type: string
        requiresExplicitPluginId:
          type: boolean

    CommandReadiness:
      type: object
      properties:
        status:
          type: string
          enum: [ready, degraded, unavailable]
        summary:
          type: string
        reason:
          type: string
        activePluginCount:
          type: integer
        pendingRecoveryTotal:
          type: integer
        ignoredRecoveryTotal:
          type: integer
        recentExpiredCommand:
          type: boolean
        lastFailureCode:
          type: [string, 'null']
        oldestUndeliveredMs:
          type: integer
        minUndeliveredTimeRemainingMs:
          type: [integer, 'null']
        maxUndeliveredTimeoutRatio:
          type: number
        nearTimeoutRatio:
          type: number
        queueBacklogThresholdMs:
          type: integer
        baseTimingLagThresholdMs:
          type: integer
        timingLagThresholdMs:
          type: integer
        timingLagThresholdSource:
          type: string
        timingBottleneckStage:
          type: [string, 'null']
        timingBottleneckDurationMs:
          type: [integer, 'null']
        timingBottleneckCommandType:
          type: [string, 'null']

    TransportHealth:
      type: object
      properties:
        grade:
          type: string
        summary:
          type: string
        reason:
          type: string
        activeClients:
          type: object
          properties:
            sse:
              type: integer
            ws:
              type: integer
            total:
              type: integer
        recentRuntimeEventTotal:
          type: integer
        recent:
